<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> تسجيل </title>
        <!-- Bootstrap 5 CSS -->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
       
    </style>
</head>
<body>
 


<section class="najah-auth-page py-5">

    <div class="najah-auth-overlay"></div>

    <a href="index.html"><img
         src="assets/images/dark-logo.png"
        class="najah-auth-logo"
        alt="Logo"></a>

    <div class="container-fluid">

        <div class="row min-vh-100 align-items-center">

            <div class="col-xl-5 col-lg-6">

                <div class="najah-auth-card">

                    <h1 class="najah-auth-title">
                        إنشاء حساب جديد
                    </h1>

                    <!-- Trial -->

                    <div class="najah-trial-box">

                        <div class="najah-trial-text">
                            <strong>تجربة مجانية</strong>
                            <span>لمدة ٣ أيام</span>
                        </div>

                        <div class="najah-trial-icon">
                            <i class="bi bi-gift-fill"></i>
                        </div>

                    </div>

                    <!-- Account Type -->

                    <div class="najah-account-section">

                        <h5 class="najah-section-title">
                            نوع الحساب
                        </h5>

                        <div class="row g-3">

                            <div class="col-6">

                                <div class="najah-account-card">

                                    <span class="najah-coming-badge">
                                        قريباً
                                    </span>

                                    <span>طلبة</span>

                                    <i class="bi bi-mortarboard"></i>

                                </div>

                            </div>

                            <div class="col-6">

                                <div class="najah-account-card">

                                    <span>معلم</span>

                                    <i class="bi bi-book"></i>

                                </div>

                            </div>

                            <div class="col-6">

                                <div class="najah-account-card">

                                    <span class="najah-coming-badge">
                                        قريباً
                                    </span>

                                    <span>ولي أمر</span>

                                    <i class="bi bi-person"></i>

                                </div>

                            </div>

                            <div class="col-6">

                                <div class="najah-account-card">

                                    <span class="najah-coming-badge">
                                        قريباً
                                    </span>

                                    <span>جهة تعليمية</span>

                                    <i class="bi bi-bank"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- Form -->

                    <form class="mt-4">

                        <div class="najah-field">

                            <label>
                                الاسم كامل
                            </label>

                            <div class="najah-input-box">

                                <i class="bi bi-person"></i>

                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="مها محمد">

                            </div>

                        </div>

                        <div class="najah-field">

                            <label>
                                البريد الإلكتروني
                            </label>

                            <div class="najah-input-box">

                                <i class="bi bi-envelope"></i>

                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="youremail@email.com">

                            </div>

                        </div>

                        <div class="najah-field">

                            <label>
                                كلمة المرور
                            </label>

                            <div class="najah-input-box">

                                <i class="bi bi-lock"></i>

                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="********">

                            </div>

                        </div>

                        <div class="najah-field">

                            <label>
                                تأكيد كلمة المرور
                            </label>

                            <div class="najah-input-box">

                                <i class="bi bi-shield-lock"></i>

                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="********">

                            </div>

                        </div>

                        <button
                            type="submit"
                            class="najah-submit-btn">

                            إنشاء الحساب

                        </button>

                        <div class="najah-login-link">

                            لديك حساب ؟

                            <a href="login.html">
                                تسجيل الدخول
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>



<script>

document.querySelectorAll('.najah-account-card').forEach(card => {

    card.addEventListener('click', function(){

        if(this.classList.contains('active')){

            this.classList.remove('active');
            return;
        }

        document
            .querySelectorAll('.najah-account-card')
            .forEach(item => item.classList.remove('active'));

        this.classList.add('active');

    });

});

</script>


</body>
</html>
