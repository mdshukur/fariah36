<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Najd AI | Log In</title>
        <!-- Bootstrap 5 CSS -->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
</head>
<body>
 



    <section class="najah-auth-page">

    <div class="najah-auth-overlay"></div>

    <div class="container-fluid">

        <div class="row min-vh-100 align-items-center">

            <div class="col-xl-6 col-lg-7">

                <div class="najah-auth-card">

                    <h1 class="najah-auth-title">
                        مرحباً بعودتك
                    </h1>

                    <p class="najah-auth-subtitle">
                        سجل دخولك للوصول إلى أدواتك التعليمية الذكية
                    </p>

                    <form>

                        <div class="najah-field">

                            <label>
                                البريد الإلكتروني
                            </label>

                            <div class="najah-input-box">

                                <i class="bi bi-envelope"></i>

                                <input
                                    type="email"
                                    class="form-control"
                                    placeholder="ادخل بريدك الإلكتروني"
                                >

                            </div>

                        </div>

                        <div class="najah-field">

                            <label>
                                كلمة المرور
                            </label>

                            <div class="najah-input-box">

                                <i class="bi bi-lock"></i>

                                <input
                                    type="password"
                                    class="form-control"
                                    placeholder="ادخل كلمة المرور"
                                >

                            </div>

                        </div>

                        <div class="najah-forgot-link">
                            <a href="#">
                                هل نسيت كلمة المرور ؟
                            </a>
                        </div>

                        <button class="najah-submit-btn">
                            تسجيل الدخول
                        </button>

                        <div class="najah-register-link">
                            ليس لديك حساب ؟
                            <a href="sign-up.html">
                                إنشاء حساب
                            </a>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

  <a href="index.html">  <img
        src="assets/images/dark-logo.png"
        class="najah-auth-logo"
        alt=""
    ></a>

</section>



</body>
</html>
